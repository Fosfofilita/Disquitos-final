<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disquitos - Tienda de Discos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .contenedor { display: flex; gap: 40px; }
        .seccion { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 50%; }
        .producto, .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        button { background: #28a745; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        button.btn-eliminar { background: #dc3545; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h1>Tienda Disquitos</h1>
    
    <div class="contenedor">
        <div class="seccion">
            <h2>Discos Disponibles</h2>
            <div id="lista-productos">Cargando catálogo...</div>
        </div>

        <div class="seccion">
            <h2>Tu Carrito</h2>
            <div id="contenido-carrito">El carrito está vacío.</div>
            <h3>Total: $<span id="total-compra">0</span></h3>
            <button onclick="limpiarSesion()" style="background: #6c757d;">Vaciar Carrito</button>
        </div>
    </div>

    <script>
        // 1. Cargar productos desde la API de Flask al abrir la página
        async function cargarProductos() {
            try {
                const respuesta = await fetch('/productos');
                const datos = await respuesta.json();
                const contenedor = document.getElementById('lista-productos');
                contenedor.innerHTML = '';

                datos["Discos Disponibles"].forEach(p => {
                    contenedor.innerHTML += `
                        <div class="producto">
                            <span><strong>${p.nombre}</strong> - $${p.precio}</span>
                            <button onclick="agregarAlCarrito('${p.nombre}')">Agregar</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar productos:", error);
            }
        }

        // 2. Agregar un producto al carrito usando POST
        async function agregarAlCarrito(nombreProducto) {
            try {
                const respuesta = await fetch('/carrito/agregar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: nombreProducto, cantidad: 1 })
                });
                
                if (respuesta.ok) {
                    actualizarInterfazCarrito();
                }
            } catch (error) {
                console.error("Error al agregar al carrito:", error);
            }
        }

        // 3. Eliminar un producto del carrito usando DELETE
        async function eliminarDelCarrito(nombreProducto) {
            try {
                const respuesta = await fetch(`/carrito/${nombreProducto}`, {
                    method: 'DELETE'
                });
                if (respuesta.ok) {
                    actualizarInterfazCarrito();
                }
            } catch (error) {
                console.error("Error al eliminar del carrito:", error);
            }
        }

        // 4. Actualizar la vista del carrito y el costo total
        async function actualizarInterfazCarrito() {
            try {
                // Obtener los productos del carrito (viene como string en tu backend)
                const resCarrito = await fetch('/carrito');
                const textoCarrito = await resCarrito.text();
                
                // Convertimos el string a formato JSON real para iterarlo en JS
                // Tu endpoint actual devuelve el str() de la lista de python, reemplazamos comillas simples por dobles
                const datosCarrito = JSON.parse(textoCarrito.replace(/'/g, '"'));
                
                const contenedor = document.getElementById('contenido-carrito');
                contenedor.innerHTML = '';

                if (datosCarrito.length === 0) {
                    contenedor.innerHTML = 'El carrito está vacío.';
                } else {
                    datosCarrito.forEach(item => {
                        contenedor.innerHTML += `
                            <div class="item-carrito">
                                <span>${item.nombre} (x${item.cantidad}) - $${item.precio * item.cantidad}</span>
                                <button class="btn-eliminar" onclick="eliminarDelCarrito('${item.nombre}')">X</button>
                            </div>
                        `;
                    });
                }

                // Obtener el total acumulado
                const resTotal = await fetch('/carrito/total');
                const datosTotal = await resTotal.json();
                document.getElementById('total-compra').textContent = datosTotal["Total de Compra"];

            } catch (error) {
                console.error("Error al actualizar interfaz de carrito:", error);
            }
        }

        // 5. Limpiar la sesión por completo
        async function limpiarSesion() {
            await fetch('/limpiar', { method: 'POST' });
            actualizarInterfazCarrito();
        }

        // Ejecución inicial al cargar la página
        window.onload = function() {
            cargarProductos();
            actualizarInterfazCarrito();
        };
    </script>
</body>
</html>
