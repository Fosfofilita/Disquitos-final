openapi: 3.0.3
info:
  title: Disquitos API
  description: >
    API que gestiona un catálogo de discos y un carrito de compras.
    Permite consultar productos, agregar items al carrito, eliminarlos
    y calcular el total de la compra.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:5000

paths:
  /:
    get:
      summary: Inicio
      description: Sirve el frontend de la tienda
      operationId: inicio
      responses:
        '200':
          description: Página HTML de la tienda

  /productos:
    get:
      summary: Listar productos
      description: Devuelve todos los discos disponibles en el catálogo
      operationId: getProductos
      responses:
        '200':
          description: Lista de discos
          content:
            application/json:
              schema:
                type: object
                properties:
                  Discos Disponibles:
                    type: array
                    items:
                      type: object
                      properties:
                        nombre:
                          type: string
                          example: Arise
                        precio:
                          type: number
                          example: 2000
                        imagen:
                          type: string
                          example: arise.jpg

  /productos/{nombre}:
    get:
      summary: Ver producto por nombre
      description: Devuelve la información de un disco específico
      operationId: getProducto
      parameters:
        - name: nombre
          in: path
          required: true
          schema:
            type: string
          example: Arise
      responses:
        '200':
          description: Datos del disco encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  disco:
                    type: object
                    properties:
                      nombre:
                        type: string
                      precio:
                        type: number
                      imagen:
                        type: string
        '404':
          description: Producto no encontrado

  /carrito:
    get:
      summary: Ver carrito
      description: Muestra los productos actualmente en el carrito de la sesión
      operationId: verCarrito
      responses:
        '200':
          description: Contenido del carrito
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    nombre:
                      type: string
                    precio:
                      type: number
                    cantidad:
                      type: integer

  /carrito/agregar:
    post:
      summary: Agregar disco al carrito
      description: Agrega un disco al carrito por nombre. Si ya existe, incrementa la cantidad.
      operationId: agregarAlCarrito
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  example: Arise
                cantidad:
                  type: integer
                  example: 1
      responses:
        '200':
          description: Producto agregado correctamente
        '400':
          description: Falta el nombre del producto
        '404':
          description: Producto no encontrado

  /carrito/{nombre}:
    delete:
      summary: Eliminar disco del carrito
      description: Elimina un disco del carrito por nombre
      operationId: eliminarDelCarrito
      parameters:
        - name: nombre
          in: path
          required: true
          schema:
            type: string
          example: Arise
      responses:
        '200':
          description: Producto eliminado correctamente
        '404':
          description: Carrito vacío o producto no encontrado

  /carrito/total:
    get:
      summary: Total de la compra
      description: Calcula y devuelve el total acumulado del carrito
      operationId: totalCarrito
      responses:
        '200':
          description: Total calculado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Total de Compra:
                    type: number
                    example: 3000

  /limpiar:
    post:
      summary: Vaciar carrito / limpiar sesión
      description: Limpia la sesión del usuario y vacía el carrito
      operationId: limpiarSesion
      responses:
        '200':
          description: Sesión reiniciada correctamente